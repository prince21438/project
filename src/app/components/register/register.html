<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h1 class="h3 mb-2">Sign Up</h1>
          <p class="text-muted mb-4">Create your Punjab Mandi Board account.</p>

          <form>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your name" />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="username@example.com" />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Create a password" />
            </div>
            <button type="submit" class="btn btn-warning w-100 text-success fw-semibold">Sign Up</button>
          </form>

          <p class="mt-4 text-center text-muted">
            Already registered? <a routerLink="/login" class="fw-semibold text-success">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
